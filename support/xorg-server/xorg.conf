Section "ServerLayout"
    Identifier "Layout0"
    Screen 0 "Screen0"
    InputDevice "Keyboard0" "CoreKeyboard"
    InputDevice "Mouse0" "CorePointer"
EndSection

Section "Module"
    Load "modesetting"
    Load "evdev"
EndSection

Section "Device"
    Driver     "modesetting"
    Identifier "Card0"
    Option     "kmsdev" "/dev/drmcard0"
EndSection

Section "Screen"
    Identifier "Screen0"
    Device "Card0"
EndSection

Section "InputDevice"
    Identifier "Keyboard0"
    Driver "evdev"
    Option "Device" "/dev/input/event0"
    Option "XkbLayout" "de"
    Option "XkbModel" "pc105"
EndSection

Section "InputDevice"
    Identifier "Mouse0"
    Driver "evdev"
    Option "Device" "/dev/input/event1"
EndSection
